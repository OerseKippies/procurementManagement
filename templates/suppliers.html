{% extends "base.html" %}
{% block title %}Suppliers{% endblock %}
{% block content %}
<h2>Leveranciers</h2>
<form method="post" class="card">
  <h3>Nieuwe leverancier</h3>
  <label>Naam</label><input name="name" required>
  <label>Domein</label><input name="domain">
  <label>E-mail</label><input name="contact_email" type="email">
  <label>Notities</label><textarea name="notes" rows="2"></textarea>
  <button type="submit">Opslaan</button>
</form>
<table>
  <tr><th>Naam</th><th>Domein</th><th>Actief</th><th></th></tr>
  {% for s in suppliers %}
  <tr>
    <td>{{ s.name }}</td><td>{{ s.domain }}</td><td>{{ 'ja' if s.active else 'nee' }}</td>
    <td><a href="{{ url_for('main.supplier_edit', supplier_id=s.id) }}">Bewerken</a></td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
