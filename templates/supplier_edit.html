{% extends "base.html" %}
{% block title %}Supplier bewerken{% endblock %}
{% block content %}
<h2>Leverancier bewerken</h2>
<form method="post" class="card">
  <label>Naam</label><input name="name" value="{{ supplier.name }}" required>
  <label>Domein</label><input name="domain" value="{{ supplier.domain or '' }}">
  <label>E-mail</label><input name="contact_email" value="{{ supplier.contact_email or '' }}">
  <label>Telefoon</label><input name="contact_phone" value="{{ supplier.contact_phone or '' }}">
  <label>Notities</label><textarea name="notes" rows="2">{{ supplier.notes or '' }}</textarea>
  <label><input type="checkbox" name="active" {% if supplier.active %}checked{% endif %}> Actief</label>
  <button type="submit">Opslaan</button>
</form>
{% endblock %}
