{% extends "base.html" %}
{% block title %}Purchase Orders{% endblock %}
{% block content %}
<h2>Inkooporders</h2>
<form method="post" class="card">
  <label>Leverancier</label><select name="supplier_id" required>{% for s in suppliers %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select>
  <label>Product</label><select name="supplier_product_id" required>{% for p in products %}<option value="{{ p.id }}">{{ p.supplier_product_name }} (€{{ p.current_price or 0 }})</option>{% endfor %}</select>
  <label>Aantal</label><input name="quantity" type="number" step="0.01" value="1" required>
  <label>Stukprijs</label><input name="unit_price" type="number" step="0.01" required>
  <label>Orderdatum</label><input name="order_date" type="date">
  <label>Notities</label><textarea name="notes" rows="2"></textarea>
  <button type="submit">Order aanmaken (draft)</button>
</form>
<table>
  <tr><th>#</th><th>Leverancier</th><th>Datum</th><th>Status</th><th>Totaal</th><th>Actie</th></tr>
  {% for o in orders %}
  <tr>
    <td>{{ o.id }}</td><td>{{ o.supplier_name }}</td><td>{{ o.order_date }}</td><td>{{ o.status }}</td><td>€{{ '%.2f'|format(o.total or 0) }}</td>
    <td>
      <form method="post" action="{{ url_for('main.purchase_order_status', po_id=o.id) }}" style="display:inline">
        <select name="status">
          {% for st in ['draft','ordered','received','invoiced','closed','cancelled'] %}
          <option value="{{ st }}" {% if o.status == st %}selected{% endif %}>{{ st }}</option>
          {% endfor %}
        </select>
        <button type="submit">Update</button>
      </form>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
