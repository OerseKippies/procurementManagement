<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>{% block title %}procM{% endblock %} — procurementManagement</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header><h1>procM — Inkoop &amp; leveranciers</h1></header>
  <nav>
    {% for endpoint, label in nav_items %}
      <a href="{{ url_for('main.' + endpoint) }}">{{ label }}</a>
    {% endfor %}
  </nav>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
